<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" rx="28" fill="#0B1020"/>
  <rect x="36" y="36" width="1128" height="628" rx="24" fill="url(#bg)"/>
  <text x="80" y="110" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Terniq Workflow Map</text>
  <text x="80" y="150" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="22">Codex-native workflows for planning, debugging, review, research, and environment health</text>

  <rect x="80" y="210" width="240" height="110" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="112" y="258" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">terniq-think</text>
  <text x="112" y="292" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Shape the work before code</text>

  <rect x="400" y="210" width="240" height="110" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="432" y="258" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">implement</text>
  <text x="432" y="292" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Write the actual change</text>

  <rect x="720" y="210" width="240" height="110" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="752" y="258" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">terniq-check</text>
  <text x="752" y="292" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Review before merge</text>

  <rect x="80" y="410" width="240" height="110" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="112" y="458" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">terniq-hunt</text>
  <text x="112" y="492" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Debug from evidence</text>

  <rect x="400" y="410" width="240" height="110" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="432" y="458" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">terniq-read</text>
  <text x="432" y="492" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Collect sources and docs</text>

  <rect x="720" y="410" width="240" height="110" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="752" y="458" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">terniq-learn</text>
  <text x="752" y="492" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Synthesize unfamiliar topics</text>

  <rect x="970" y="300" width="140" height="130" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="998" y="352" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">health</text>
  <text x="998" y="386" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Audit</text>
  <text x="998" y="410" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">Codex drift</text>

  <path d="M320 265H400" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
  <path d="M640 265H720" stroke="#38BDF8" stroke-width="8" stroke-linecap="round"/>
  <path d="M320 465H400" stroke="#22C55E" stroke-width="8" stroke-linecap="round"/>
  <path d="M640 465H720" stroke="#22C55E" stroke-width="8" stroke-linecap="round"/>
  <path d="M960 265H1020V300" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M960 465H1020V430" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="320" cy="265" r="10" fill="#38BDF8"/>
  <circle cx="640" cy="265" r="10" fill="#38BDF8"/>
  <circle cx="320" cy="465" r="10" fill="#22C55E"/>
  <circle cx="640" cy="465" r="10" fill="#22C55E"/>

  <text x="80" y="605" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Typical chains: plan -&gt; implement -&gt; review | debug -&gt; fix -&gt; review | read -&gt; learn -&gt; write</text>
  <text x="80" y="635" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="16">Commands like /terniq:plan, /terniq:review, and /terniq:debug act as explicit entry points.</text>

  <defs>
    <linearGradient id="bg" x1="36" y1="36" x2="1164" y2="664" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
</svg>
